<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login 🎀</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* O mesmo fundo fofo de bolinhas */
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #ffe6ea;
            background-image: radial-gradient(#ffb3c6 2px, transparent 2px);
            background-size: 30px 30px;
            color: #5a5a5a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Container centralizado */
        .hello-kitty-container {
            background-color: #ffffff;
            border: 4px solid #ff99cc;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(255, 153, 204, 0.4);
            padding: 40px;
            width: 100%;
            max-width: 400px; /* Um pouco menor para o login ficar mais charmoso */
        }

        h1 {
            text-align: center;
            color: #ff4d94;
            font-size: 2.2em;
            margin-bottom: 30px;
            font-weight: 700;
            text-shadow: 2px 2px 0px #ffe6ea;
        }

        .form-label {
            font-weight: 700;
            color: #ff66a3;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .form-control {
            border: 2px dashed #ffb3c6;
            border-radius: 15px;
            padding: 12px 15px;
            background-color: #fff9fb;
            color: #5a5a5a;
            box-shadow: none;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #ff4d94;
            border-style: solid;
            background-color: #ffffff;
            box-shadow: 0 0 10px rgba(255, 77, 148, 0.2);
        }

        .form-control::placeholder {
            color: #d1b3c4;
        }

        .btn-entrar {
            width: 100%;
            background-color: #ff66a3;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 20px;
            font-size: 1.2em;
            font-weight: 700;
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(255, 102, 163, 0.4);
            transition: all 0.3s ease;
        }

        .btn-entrar:hover {
            background-color: #ff4d94;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 102, 163, 0.6);
        }

        .btn-entrar:active {
            transform: translateY(1px);
        }

        /* Estilo para os links extras do formulário */
        .links-extras {
            text-align: center;
            margin-top: 20px;
        }

        .links-extras a {
            color: #ff66a3;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9em;
            transition: color 0.3s ease;
        }

        .links-extras a:hover {
            color: #ff4d94;
            text-decoration: underline dashed;
        }
    </style>
</head>
<body>

    <div class="hello-kitty-container">
        <h1>🎀 Login 🌸</h1>

        <div data-th-if="${erro != null}" class="alert alert-danger text-center" style="border-radius: 15px; background-color: #ffccd5; color: #ff4d94; border: 2px dashed #ff4d94;">
            <strong data-th-text="${erro}"></strong> 😿
        </div>

        <form method="post" action="/aluno/login">
            
            <div class="mb-3">
                <label for="email" class="form-label">Email:</label>
                <input id="email" name="email" type="email" class="form-control" placeholder="Seu email cadastrado" required>
            </div>

            <div class="mb-3">
                <label for="senha" class="form-label">Senha:</label>
                <input id="senha" name="senha" type="password" class="form-control" placeholder="Sua senha secreta" required>
            </div>

            <button type="submit" class="btn-entrar">Entrar ✨</button>

        </form>

        <div class="links-extras">
        <a href="/aluno/cadastro">Ainda não tem conta? Cadastre-se 💖</a>        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
