<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Aluno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <h1>Cadastro Aluno</h1>
</head>
<body>
    <form method="post" action="/aluno/novo">
        <label for="nome">Nome: </label>
        <input id="nome" name="nome" type="text" placeholder="ex: Pedro a Rocha"><br><br>
        <label for="email">Email: </label>
        <input id="email" nome="email" type="text" placeholder="ex: pedro@pedromail.com"><br><br>
        <label for="senha">Senha: </label>
        <input id="senha" name="senha" type="password" placeholder="ex: @#Senha_Forte556"><br><br>

        <button type="submit">Salvar</button>

    </form>
    
</body>
</html>
