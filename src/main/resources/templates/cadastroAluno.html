<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Aluno 🎀</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* Substituindo o fundo padrão pelo fundo fofo */
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #ffe6ea;
            background-image: radial-gradient(#ffb3c6 2px, transparent 2px);
            background-size: 30px 30px;
            color: #5a5a5a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Container centralizado estilo Hello Kitty */
        .hello-kitty-container {
            background-color: #ffffff;
            border: 4px solid #ff99cc;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(255, 153, 204, 0.4);
            padding: 40px;
            width: 100%;
            max-width: 500px;
        }

        /* Estilizando o título */
        h1 {
            text-align: center;
            color: #ff4d94;
            font-size: 2.2em;
            margin-bottom: 30px;
            font-weight: 700;
            text-shadow: 2px 2px 0px #ffe6ea;
        }

        /* Customizando as Labels do Bootstrap */
        .form-label {
            font-weight: 700;
            color: #ff66a3;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        /* Customizando os Inputs do Bootstrap */
        .form-control {
            border: 2px dashed #ffb3c6;
            border-radius: 15px;
            padding: 12px 15px;
            background-color: #fff9fb;
            color: #5a5a5a;
            box-shadow: none;
            transition: all 0.3s ease;
        }

        /* Efeito ao clicar no input (Focus) */
        .form-control:focus {
            border-color: #ff4d94;
            border-style: solid;
            background-color: #ffffff;
            box-shadow: 0 0 10px rgba(255, 77, 148, 0.2);
        }

        .form-control::placeholder {
            color: #d1b3c4;
        }

        /* Customizando o Botão */
        .btn-salvar {
            width: 100%;
            background-color: #ff66a3;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 20px;
            font-size: 1.2em;
            font-weight: 700;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(255, 102, 163, 0.4);
            transition: all 0.3s ease;
        }

        .btn-salvar:hover {
            background-color: #ff4d94;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 102, 163, 0.6);
        }

        .btn-salvar:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div class="hello-kitty-container">
        <h1>🎀 Cadastro Aluno 🌸</h1>

        <form method="post" action="/aluno/cadastro">

            <div>
                <input type="hidden" name="id" th:value="${aluno?.id}">
            </div>
            
            <div class="mb-3">
                <label for="nome" class="form-label">Nome:</label>
                <input id="nome" name="nome" type="text" class="form-control" placeholder="ex: Pedro a Rocha" required th:value="${aluno?.nome}">
            </div>

            <div class="mb-3">
                <label for="cpf" class="form-label">CPF:</label>
                <input id="cpf" name="cpf" type="text" class="form-control" placeholder="000.000.000-00" required th:value="${aluno?.cpf}">
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email:</label>
                <input id="email" name="email" type="email" class="form-control" placeholder="ex: pedro@pedromail.com" required th:value="${aluno?.email}">
            </div>

            <div class="mb-4">
                <label for="senha" class="form-label">Senha:</label>
                <input id="senha" name="senha" type="password" class="form-control" placeholder="ex: @#Senha_Forte556" required th:value="${aluno?.senha}">
            </div>

            <button type="submit" class="btn-salvar">Salvar ✨</button>

        </form>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
