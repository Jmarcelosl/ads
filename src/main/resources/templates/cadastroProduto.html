<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registar Produto 🎀</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #ffe6ea;
            background-image: radial-gradient(#ffb3c6 2px, transparent 2px);
            background-size: 30px 30px;
            color: #5a5a5a;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
        }

        .hello-kitty-container {
            background-color: #ffffff;
            border: 4px solid #ff99cc;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(255, 153, 204, 0.4);
            padding: 40px; width: 100%; max-width: 500px;
        }

        h1 {
            text-align: center; color: #ff4d94; font-size: 2.2em;
            margin-bottom: 30px; font-weight: 700; text-shadow: 2px 2px 0px #ffe6ea;
        }

        .form-label { font-weight: 700; color: #ff66a3; margin-bottom: 5px; }

        .form-control {
            border: 2px dashed #ffb3c6; border-radius: 15px; padding: 12px 15px;
            background-color: #fff9fb; color: #5a5a5a; transition: all 0.3s ease; box-shadow: none;
        }

        .form-control:focus {
            border-style: solid; border-color: #ff4d94; background-color: #ffffff;
            box-shadow: 0 0 10px rgba(255, 77, 148, 0.2);
        }

        .btn-salvar {
            width: 100%; background-color: #ff66a3; color: white; padding: 14px;
            border: none; border-radius: 20px; font-size: 1.2em; font-weight: 700;
            margin-top: 15px; transition: all 0.3s ease; box-shadow: 0 5px 15px rgba(255, 102, 163, 0.4);
        }

        .btn-salvar:hover {
            background-color: #ff4d94; color: white; transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 102, 163, 0.6);
        }
    </style>
</head>
<body>

    <div class="hello-kitty-container">
        <h1>🎀 Novo Produto 📦</h1>

        <div data-th-if="${mensagemSucesso != null}" class="alert text-center" style="border-radius: 15px; background-color: #e6ffed; color: #ff4d94; border: 2px dashed #ff4d94; font-weight: bold;">
            <span data-th-text="${mensagemSucesso}"></span>
        </div>

        <form method="post" action="/produto/cadastro">
            
            <div class="mb-3">
                <label for="nome" class="form-label">Nome do Produto:</label>
                <input id="nome" name="nome" type="text" class="form-control" placeholder="Ex: Caderno Fofo" required>
            </div>

            <div class="mb-3">
                <label for="preco" class="form-label">Preço (€):</label>
                <input id="preco" name="preco" type="number" step="0.01" class="form-control" placeholder="0.00" required>
            </div>

            <div class="mb-4">
                <label for="estoque" class="form-label">Quantidade em Estoque:</label>
                <input id="estoque" name="estoque" type="number" class="form-control" placeholder="Ex: 10" required>
            </div>

            <button type="submit" class="btn-salvar">Guardar ✨</button>
        </form>

        <div style="text-align: center; margin-top: 20px;">
            <a href="/produto/lista" style="color: #ff66a3; text-decoration: none; font-weight: bold;">← Ver lista de produtos</a>
        </div>
    </div>

</body>
</html>
