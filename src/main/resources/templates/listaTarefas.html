<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Tarefas 🎀</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Fundo da página fofo */
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #ffe6ea;
            background-image: radial-gradient(#ffb3c6 2px, transparent 2px);
            background-size: 30px 30px;
            color: #5a5a5a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Container principal */
        .hello-kitty-container {
            background-color: #ffffff;
            border: 4px solid #ff99cc;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(255, 153, 204, 0.4);
            padding: 40px;
            width: 100%;
            max-width: 850px;
        }

        h1 {
            text-align: center;
            color: #ff4d94;
            font-size: 2.2em;
            margin-top: 0;
            margin-bottom: 25px;
            text-shadow: 2px 2px 0px #ffe6ea;
            font-weight: 700;
        }

        /* --- INPUT DE NOVA TAREFA --- */
        .form-control {
            border: 2px dashed #ffb3c6;
            border-radius: 15px;
            padding: 12px 15px;
            background-color: #fff9fb;
            color: #5a5a5a;
            box-shadow: none;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #ff4d94;
            border-style: solid;
            background-color: #ffffff;
            box-shadow: 0 0 10px rgba(255, 77, 148, 0.2);
        }

        .btn-adicionar {
            background-color: #ff66a3;
            color: white;
            border: none;
            border-radius: 15px;
            padding: 0 25px;
            font-weight: bold;
            font-size: 1.1em;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 102, 163, 0.4);
        }

        .btn-adicionar:hover {
            background-color: #ff4d94;
            transform: translateY(-2px);
            color: white;
        }

        /* --- TABELA --- */
        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 0 0 2px #ffe6ea;
            margin-top: 10px;
        }

        th {
            background-color: #ff66a3;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.1em;
            letter-spacing: 1px;
            border-bottom: 3px solid #ff4d94;
        }

        td {
            padding: 15px;
            border-bottom: 2px dashed #ffb3c6;
            color: #666;
            font-weight: 600;
            vertical-align: middle;
        }

        tbody tr {
            background-color: #fff9fb;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        tbody tr:hover {
            background-color: #ffe6ea;
            transform: scale(1.01);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        /* --- BADGES (Status) --- */
        .badge-status {
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 0.9em;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s;
        }
        
        .badge-status:hover {
            transform: scale(1.05);
        }

        .pendente {
            background-color: #ffe066; /* Amarelo pastel */
            color: #b38f00;
            border: 2px solid #ffd633;
        }

        .concluida {
            background-color: #99e6b3; /* Verde pastel */
            color: #008033;
            border: 2px solid #66cc8a;
        }

        /* --- BOTÕES DE AÇÃO --- */
        .btn-acao {
            padding: 6px 12px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 0.85em;
            transition: all 0.3s ease;
            display: inline-block;
            margin: 0 3px;
        }

        .btn-editar {
            background-color: #dcb3ff; /* Lilás pastel fofo */
            color: white;
        }
        .btn-editar:hover {
            background-color: #c280ff;
            color: white;
            transform: translateY(-2px);
        }

        .btn-excluir {
            background-color: #ff99cc; /* Rosa claro */
            color: white;
        }
        .btn-excluir:hover {
            background-color: #ff4d94;
            color: white;
            transform: translateY(-2px);
        }

        /* Tarefa riscada quando concluída */
        .tarefa-riscada {
            text-decoration: line-through;
            color: #b3b3b3;
            font-style: italic;
        }

    </style>
</head>
<body>

    <div class="hello-kitty-container">
        <h1>🎀 Minhas Tarefas 🌸</h1>
        
        <div data-th-if="${mensagemSucesso != null}" class="alert text-center" style="border-radius: 15px; background-color: #e6ffed; color: #ff4d94; border: 2px dashed #ff4d94; font-weight: bold; margin-bottom: 20px;">
            <span data-th-text="${mensagemSucesso}"></span>
        </div>

        <form action="/tarefa/nova" method="post" class="d-flex mb-4">
            <input type="text" name="descricao" class="form-control me-2" placeholder="O que precisamos fazer hoje? ✨" required>
            <button type="submit" class="btn-adicionar">Adicionar 💖</button>
        </form>

        <table>
            <thead>
                <tr>
                    <th style="width: 15%;">Status</th>
                    <th style="width: 55%; text-align: left;">Descrição da Tarefa</th>
                    <th style="width: 30%;">Ações</th>
                </tr>
            </thead>

            <tbody>
                <tr data-th-each="tarefa: ${tarefas}">
                    
                    <td class="text-center">
                        <a data-th-href="@{/tarefa/status/{id}(id=${tarefa.id})}" style="text-decoration: none;">
                            <span data-th-if="${tarefa.concluida}" class="badge-status concluida">✅ Concluída</span>
                            <span data-th-unless="${tarefa.concluida}" class="badge-status pendente">⏳ Pendente</span>
                        </a>
                    </td>

                    <td style="text-align: left;" 
                        data-th-text="${tarefa.descricao}" 
                        data-th-classappend="${tarefa.concluida} ? 'tarefa-riscada' : ''">
                    </td>

                    <td class="text-center">
                        <a data-th-href="@{/tarefa/editar/{id}(id=${tarefa.id})}" class="btn-acao btn-editar">Editar ✏️</a>
                        
                        <a data-th-href="@{/tarefa/excluir/{id}(id=${tarefa.id})}" class="btn-acao btn-excluir" 
                           onclick="return confirm('Excluir esta tarefa? 🥺');">Excluir 🗑️</a>
                    </td>
                </tr>
            </tbody>
        </table>
        
        <div style="text-align: center; margin-top: 25px;">
            <a href="/aluno/lista" style="color: #ff66a3; text-decoration: none; font-weight: bold;">← Voltar para Alunos</a>
        </div>
    </div>

</body>
</html>
