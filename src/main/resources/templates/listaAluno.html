<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Alunos 🎀</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Estilo do fundo da página */
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #ffe6ea; /* Fundo rosa pastel */
            background-image: radial-gradient(#ffb3c6 2px, transparent 2px); /* Efeito de bolinhas */
            background-size: 30px 30px;
            color: #5a5a5a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Caixa branca que segura a tabela */
        .hello-kitty-container {
            background-color: #ffffff;
            border: 4px solid #ff99cc; /* Borda rosa forte */
            border-radius: 25px; /* Cantos bem arredondados */
            box-shadow: 0 10px 20px rgba(255, 153, 204, 0.4); /* Sombra suave rosa */
            padding: 40px;
            width: 100%;
            max-width: 700px;
        }

        /* Título */
        h1 {
            text-align: center;
            color: #ff4d94; /* Rosa característico */
            font-size: 2.2em;
            margin-top: 0;
            margin-bottom: 25px;
            text-shadow: 2px 2px 0px #ffe6ea;
        }

        /* Estilo da Tabela */
        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 15px; /* Arredonda a tabela */
            box-shadow: 0 0 0 2px #ffe6ea; /* Borda sutil na tabela toda */
        }

        /* Cabeçalho da Tabela */
        th {
            background-color: #ff66a3; /* Rosa escuro/choque */
            color: white;
            padding: 18px;
            text-align: left;
            font-size: 1.1em;
            letter-spacing: 1px;
            border-bottom: 3px solid #ff4d94;
        }

        /* Células da Tabela */
        td {
            padding: 15px 18px;
            border-bottom: 2px dashed #ffb3c6; /* Linha pontilhada fofa entre alunos */
            color: #666;
            font-weight: 600;
        }

        /* Linhas da Tabela */
        tbody tr {
            background-color: #fff9fb;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        /* Efeito ao passar o mouse por cima (Hover) */
        tbody tr:hover {
            background-color: #ffe6ea; /* Fica um rosa mais escurinho */
            transform: scale(1.01); /* Dá um leve zoom */
        }

        /* Remove a linha pontilhada do último aluno */
        tbody tr:last-child td {
            border-bottom: none;
        }
    </style>
</head>
<body>

    <div class="hello-kitty-container">
        <h1>🎀 Lista de Alunos 🌸</h1>
        
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Email</th>
                </tr>
            </thead>

            <tbody>
                <tr data-th-each="aluno: ${alunos}">
                    <td data-th-text="${aluno.nome}"></td>
                    <td data-th-text="${aluno.email}"></td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
