<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Tarefa 🎀</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Nunito', sans-serif; background-color: #ffe6ea;
            background-image: radial-gradient(#ffb3c6 2px, transparent 2px); background-size: 30px 30px;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px;
        }
        .hello-kitty-container {
            background-color: #ffffff; border: 4px solid #dcb3ff; /* Lilás da edição */
            border-radius: 25px; box-shadow: 0 10px 20px rgba(220, 179, 255, 0.4);
            padding: 40px; width: 100%; max-width: 500px;
        }
        h1 { text-align: center; color: #c280ff; font-weight: 700; margin-bottom: 30px; }
        .form-control { border: 2px dashed #dcb3ff; border-radius: 15px; padding: 12px 15px; background-color: #fcf9ff; }
        .form-control:focus { border-style: solid; box-shadow: none; border-color: #c280ff;}
        .btn-salvar { width: 100%; background-color: #dcb3ff; color: white; padding: 14px; border: none; border-radius: 20px; font-weight: bold; margin-top: 15px; transition: 0.3s; }
        .btn-salvar:hover { background-color: #c280ff; transform: translateY(-2px); color: white;}
    </style>
</head>
<body>

    <div class="hello-kitty-container">
        <h1>✏️ Editar Tarefa 🎀</h1>
        
        <form action="/tarefa/editar" method="post">
            <input type="hidden" name="id" data-th-value="${tarefa.id}">
            <input type="hidden" name="concluida" data-th-value="${tarefa.concluida}">
            
            <div class="mb-3">
                <label class="form-label" style="color: #c280ff; font-weight: bold;">Descrição da Tarefa:</label>
                <input type="text" name="descricao" class="form-control" data-th-value="${tarefa.descricao}" required>
            </div>

            <button type="submit" class="btn-salvar">Guardar Alterações ✨</button>
        </form>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="/tarefa/lista" style="color: #c280ff; text-decoration: none; font-weight: bold;">Cancelar</a>
        </div>
    </div>

</body>
</html>
